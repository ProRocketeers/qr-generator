services:
  postgres:
    image: postgres:16
    container_name: qr-generator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qr_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - '5436:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qr_generator"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: qr-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'True'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:
